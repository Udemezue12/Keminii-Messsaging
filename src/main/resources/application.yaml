
spring:
  rabbitmq:
    host: ${RABBITMQ_HOST}
    password: ${RABBITMQ_PASSWORD}
    username: ${RABBITMQ_USERNAME}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST}
    port: ${RABBITMQ_PORT}
    addresses: ${RABBITMQ_URL}

  application:
    name: chat
  security:
    user:
      name: ${SWAGGER_ADMIN:swagger_admin}
      password: ${SWAGGER_ADMIN_PASSWORD}
      roles: SWAGGER_ADMIN

  jwt:
    secret: ${SECRET_KEY}
    expiration: ${EXPIRATION}
    accessExpiration: 900
    refreshExpiration: 604800
    issuer: ${JWT_ISSUER}
  data:
    redis:
      url: ${REDIS_URL}
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
      timeout: 5s

    mongodb:
      database: ${MONGODB_DATABASE}
      uri: ${MONGODB_URL}
      uuid-representation: standard
      auto-index-creation: false
  cache:
    type: redis
server:
  port: 8080
logging:
  level:
    org:
      springframework:
        security:
          config:
            annotation:
              authentication:
                configuration:
                  InitializeUserDetailsBeanManagerConfigurer: ERROR
          # beans:
          #   # factory:
          #   #   support: TRACE
          web:
            socket:
              messaging: TRACE
          messaging:
            simp:
              annotation:
                support: TRACE
        hibernate:
          orm:
            jdbc:
              bind: TRACE

jobrunr:
    background-job-server:
      enabled: true
    dashboard:
      enabled: false
      # port: 8081
    jobs:
      default-number-of-retries: 5
    job-scheduler:
      enabled: true

notification:
  termii-base-url: ${TERMII_BASE_URL}
  termii-api-key: ${TERMII_API_KEY}
  termii-sender-id: ${TERMII_SENDER_ID}

  brevo-api-key: ${BREVO_API_KEY}
  brevo-url: ${BREVO_URL}
  project-name: ${PROJECT_NAME}
  email-host: smtp.gmail.com
  email-port: ${EMAIL_PORT:587}
  email-username: ${EMAIL_USERNAME}
  email-password: ${EMAIL_PASSWORD}
  email-use-tls: true

  frontend-url: ${FRONTEND_URL}
  send-champ-base-url: ${SEND_CHAMP_URL}
  send-champ-api-key: ${SEND_CHAMP_API_KEY}
  send-champ-sender-id: ${SEND_CHAMP_SENDER_ID}
auth:
  redis-url: ${REDIS_URL}

  reset-password-salt: ${RESET_PASSWORD_SALT}
  reset-secret-key: ${RESET_SECRET_KEY}

  verify-email-salt: ${VERIFY_EMAIL_SALT}
  verify-email-secret-key: ${VERIFY_EMAIL_SECRET_KEY}
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-secret: ${CLOUDINARY_SECRET_KEY}
  api-key: ${CLOUDINARY_API_KEY}
  signature-version: ${CLOUDINARY_SIGNATURE_VERSION:1}


application:
  author: ${AUTHOR}
  author-email: ${AUTHOR_EMAIL}
  author-url: ${AUTHOR_URL}
pingers:
  ping-urls: ${URLS}
cors:
  allowed-origins: ${ALLOWED_URL}
  allowed-email-domains: ${ALLOWED_EMAIL_DOMAINS}
mongock:
  enabled: false
  migration-scan-package: com.astrotech.chat.migrations
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    csrf:
      enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    persist-authorization: true
    enabled: ${SWAGGER_ENABLED:false}


  group-configs:
    - group: public
      paths-to-match:
        - /api/v1/**
      paths-to-exclude:
        - /api/v1/admin/**
        - /api/v1/cloudinary/**
        - /error
        - /actuator/**

    - group: admin
      paths-to-match:
              - /api/v1/admin/**
              - /api/v1/cloudinary/**
  show-actuator: false

  cache:
    disabled: true
  app:
    name: Spring Boot API
    version: 1.0.0
    description: API documentation for Spring Boot application
debug: false
app:
  encryption:
    aes-algorithm: ${AES_ALGORITHM}
    rsa-algorithm: ${RSA_ALGORITHM}
    server-key-hex: ${SERVER_KEY_HEX}
    iv-length: ${IV_LENGTH}
    gcm-tag-length: ${GCM_TAG_LENGTH}
    server-secret: ${SERVER_SECRET}
    production-mode : ${PRODUCTION_MODE:false}
  stomp:
    relay-port: ${RABBITMQ_STOMP_PORT:61613}
  swagger:
    username: ${SWAGGER_USERNAME}
    password: ${SWAGGER_PASSWORD}
    role: ${SWAGGER_ROLE}