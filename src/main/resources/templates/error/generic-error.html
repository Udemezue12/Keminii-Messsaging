<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Something went wrong</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-color: #ef4444;
            --accent-hover: #dc2626;
            --border-color: #e2e8f0;
            --shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .error-card {
            background-color: var(--card-bg);
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: var(--shadow);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 0.6s ease-out forwards;
            border: 1px solid var(--border-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-container {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--accent-color);
        }

        p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: #e2e8f0;
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background-color: #cbd5e1;
        }

        .redirect-text {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .details-container {
            margin-top: 1.5rem;
            text-align: left;
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="error-card">
    <div class="icon-container">⚠️</div>
    <h1>Something went wrong</h1>
    <p>An unexpected error occurred on the server. We are already looking into the issue and working to get things back to normal.</p>

    
    <div class="details-container" th:if="${error != null}">
        <strong>Error:</strong> <span th:text="${error}">Internal Server Error</span><br>
        <strong>Message:</strong> <span th:text="${message}">No message available</span>

    </div>

    <div class="actions">
        <button class="btn btn-secondary" onclick="toggleDetails()">Show Details</button>
        <a href="/" class="btn btn-primary">Return Home</a>
    </div>

    <div class="redirect-text">
        Redirecting to homepage in <span id="countdown">5</span> seconds...
    </div>
</div>

<script>
    // JS: Dynamic redirect with countdown
    let seconds = 5;
    const countdownElement = document.getElementById('countdown');

    const interval = setInterval(() => {
        seconds--;
        countdownElement.textContent = seconds;

        if (seconds <= 0) {
            clearInterval(interval);
            window.location.href = '/';
        }
    }, 1000);

    // JS: Toggle utility for inspecting error traces
    function toggleDetails() {
        const details = document.querySelector('.details-container');
        if (details.style.display === 'none' || details.style.display === '') {
            details.style.display = 'block';
        } else {
            details.style.display = 'none';
        }
    }
</script>
</body>
</html>
